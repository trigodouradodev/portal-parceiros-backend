name: PR Checks

on:
  pull_request:
    branches: [dev, homolog, main]
    types: [opened, edited, reopened, synchronize]

jobs:
  validate-ticket:
    if: ${{ !startsWith(github.head_ref, 'fix/') && !startsWith(github.head_ref, 'hotfix/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate ClickUp ticket in title and description
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Check description contains ClickUp URL
          if ! echo "$PR_BODY" | grep -qE 'app\.clickup\.com/t/[a-zA-Z0-9]+'; then
            echo "❌ A descrição do PR deve conter o link do ticket no ClickUp."
            echo "   Formato esperado: https://app.clickup.com/t/<task-id>"
            exit 1
          fi

          # Extract task ID from the ClickUp URL in the description
          TASK_ID=$(echo "$PR_BODY" | grep -oE 'app\.clickup\.com/t/[a-zA-Z0-9]+' | head -1 | grep -oE '[a-zA-Z0-9]+$')

          # Check title contains the task ID
          if ! echo "$PR_TITLE" | grep -qi "$TASK_ID"; then
            echo "❌ O título do PR deve conter o ID do ticket ClickUp ($TASK_ID)."
            echo "   Título atual: $PR_TITLE"
            echo "   Exemplo: [$TASK_ID]: Descrição da mudança"
            exit 1
          fi

          echo "✅ Título e descrição contêm o ticket ClickUp ($TASK_ID)"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npx prettier --check "src/**/*.ts" "test/**/*.ts"

      - run: npm run build

      - run: npm test
