name: PR Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Lint and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  validate-pr:
    name: Validate PR title and description
    runs-on: ubuntu-latest

    steps:
      - name: Check title and description
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const body = context.payload.pull_request.body || '';
            const branch = context.payload.pull_request.head.ref;

            // Skip validation for fix/* and hotfix/* branches
            if (/^(fix|hotfix)\//.test(branch)) {
              console.log(`✅ Branch "${branch}" — validação de título/descrição ignorada.`);
              return;
            }

            const errors = [];

            // Validate title: must start with a Jira issue key followed by colon
            // Format: TTC-129: Description...
            const titleRegex = /^TTC-\d+:/i;
            if (!titleRegex.test(title)) {
              errors.push('❌ **Título inválido**: o título deve começar com a chave do ticket Jira seguida de dois pontos.\n   Formato esperado: `TTC-129: Descrição da tarefa`');
            }

            // Validate body: must contain a Jira link
            const jiraLinkRegex = /https:\/\/aureadev\.atlassian\.net\/browse\/TTC-\d+/;
            if (!jiraLinkRegex.test(body)) {
              errors.push('❌ **Descrição inválida**: a descrição deve conter o link do ticket no Jira.\n   Exemplo: `https://aureadev.atlassian.net/browse/TTC-129`');
            }

            if (errors.length > 0) {
              const message = [
                '## ❌ PR inválido',
                '',
                'As seguintes validações falharam:',
                '',
                ...errors,
                '',
                '---',
                '_Corrija o título e/ou a descrição e o check será revalidado automaticamente._',
              ].join('\n');

              core.setFailed(message);
            } else {
              console.log('✅ Título e descrição válidos.');
            }
